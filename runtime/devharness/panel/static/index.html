<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>devharness panel</title>
<link rel="icon" href="data:,">
<meta name="theme-color" content="#0d1117">
<style>
  :root { color-scheme: dark; --bg:#0d1117; --card:#161b22; --line:#30363d; --fg:#e6edf3;
          --mut:#8b949e; --acc:#2f81f7; --ok:#3fb950; --warn:#d29922; --bad:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { position:sticky; top:0; background:#0d1117ee; backdrop-filter:blur(6px);
           border-bottom:1px solid var(--line); padding:10px 14px env(safe-area-inset-bottom); z-index:5; }
  .hint { font-size:16px; font-weight:600; }
  .hint.warn { color:var(--warn); }
  .sub { color:var(--mut); font-size:12px; margin-top:2px; display:flex; gap:10px; flex-wrap:wrap; }
  .busy { color:var(--acc); }
  main { padding:12px; max-width:820px; margin:0 auto; display:grid; gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .card h2 { margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--mut); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:6px 0; }
  button { background:var(--acc); color:#fff; border:0; border-radius:8px; padding:11px 14px;
           font-size:15px; font-weight:600; cursor:pointer; min-height:44px; }
  button.sec { background:#21262d; color:var(--fg); border:1px solid var(--line); }
  button.bad { background:#3d1418; color:var(--bad); border:1px solid #6e2329; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button.next { outline:2px solid var(--ok); outline-offset:2px; animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { outline-color:#3fb95055; } }
  button.mini { min-height:34px; padding:6px 10px; font-size:13px; }
  input, textarea, select { background:#0d1117; color:var(--fg); border:1px solid var(--line);
           border-radius:8px; padding:10px; font:inherit; width:100%; min-height:44px; }
  textarea { min-height:80px; resize:vertical; }
  .q { background:#1c2333; border:1px solid #2b3450; border-radius:8px; padding:10px; margin-bottom:8px;
       white-space:pre-wrap; }  /* the formatted question is multi-line — default CSS collapses \n */
  .chips span { display:inline-block; background:#21262d; border:1px solid var(--line);
           border-radius:20px; padding:3px 10px; margin:2px; font-size:12px; }
  .task { border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:6px 0; }
  .task .trow { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .task .tid { font:13px ui-monospace,Menlo,Consolas,monospace; color:var(--acc); white-space:nowrap; }
  .task .badge { font-size:12px; border-radius:20px; padding:2px 9px; border:1px solid var(--line);
                 color:var(--mut); white-space:nowrap; }
  .task .badge.ok { color:var(--ok); border-color:#2e5c38; }
  .task .badge.blk { color:var(--bad); border-color:#6e2329; }
  .task .badge.crt { color:var(--warn); border-color:#5c4a1e; }
  .task .desc { font-size:13px; color:var(--fg); flex:1 1 100%; margin-top:2px; }
  .task .reason { font-size:12px; color:var(--bad); flex:1 1 100%; margin-top:2px; }
  details { border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  details summary { color:var(--mut); font-size:13px; cursor:pointer; }
  #log { font:12px/1.4 ui-monospace,Menlo,Consolas,monospace; background:#010409; border:1px solid var(--line);
           border-radius:8px; padding:8px; height:220px; overflow:auto; white-space:pre-wrap; }
  #toast { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:#21262d;
           border:1px solid var(--line); border-radius:8px; padding:10px 14px; max-width:90%;
           opacity:0; transition:opacity .2s; pointer-events:none; z-index:9; }
  #toast.show { opacity:1; } #toast.err { border-color:var(--bad); color:var(--bad); }
  small { color:var(--mut); }
  .errbanner { margin-top:8px; background:#3d1418; border:1px solid #6e2329; color:#ff9b93;
               border-radius:8px; padding:10px; font-weight:600; cursor:pointer; }
  .warnbanner { margin-top:8px; background:#3a2d10; border:1px solid #5c4a1e; color:#e3b341;
               border-radius:8px; padding:10px; font-weight:600; }
  .overlay { position:fixed; inset:0; background:#000d; z-index:99; padding:12px;
             display:flex; flex-direction:column; gap:8px; }
  .overlay .body { flex:1; overflow:auto; background:var(--card); border:1px solid var(--line);
                   border-radius:8px; padding:12px; }
  .overlay h3 { margin:12px 0 4px; font-size:13px; text-transform:uppercase; color:var(--mut); }
  .overlay pre { margin:0; white-space:pre-wrap; font:13px/1.5 ui-monospace,Menlo,Consolas,monospace; }
  .overlay textarea { flex:1; width:100%; }
</style>
</head>
<body>
<header>
  <div class="hint" id="hint">…</div>
  <div class="sub">
    <span id="proj">—</span><span id="busy" class="busy"></span>
    <span id="cost"></span><span id="events"></span><span id="inv" style="color:var(--bad);font-weight:600"></span>
  </div>
  <div class="row" style="margin-top:6px">
    <button class="sec mini" onclick="copyDiag()">📋 Copy for Claude</button>
  </div>
  <div id="errbanner" class="errbanner" style="display:none" onclick="copyDiag()"></div>
  <div id="noticebanner" class="warnbanner" style="display:none"></div>
</header>
<main>
  <div class="card" id="researchCard">
    <h2>Research</h2>
    <div id="question" style="display:none">
      <div class="q" id="qtext"></div>
      <div class="row"><textarea id="answer" placeholder="your answer"></textarea></div>
      <div class="row"><button id="answerBtn" onclick="answer()">Answer</button></div>
    </div>
    <div class="row"><textarea id="seed" placeholder="new spec idea / research seed"></textarea></div>
    <div class="row"><button id="researchBtn" onclick="startResearch()">Start research</button></div>
  </div>

  <div class="card">
    <h2>Drive</h2>
    <div class="row">
      <button id="viewSpecBtn" class="sec" onclick="viewSpec()">View spec</button>
      <button id="signBtn" onclick="signSpec()">Sign spec</button>
      <button id="rejectBtn" class="sec" onclick="rejectSpec()">Reject spec</button>
    </div>
    <div class="row">
      <button id="planBtn" onclick="act('/plan')">Plan</button>
      <button id="buildBtn" onclick="act('/dispatch')">Build next task</button>
      <button id="assembleBtn" onclick="act('/assemble')">Assemble</button>
      <button id="cancelBtn" class="bad" onclick="act('/cancel')">Cancel step</button>
    </div>
    <div class="chips" id="chips"></div>
    <div id="tasks"></div>
    <details>
      <summary>advanced: act on any task_id</summary>
      <div class="row"><input id="taskid" placeholder="task_id (e.g. an older correlation's task)"></div>
      <div class="row">
        <button id="advCertify" class="sec mini" onclick="taskAct('/certify')">Certify</button>
        <button id="advIntegrate" class="sec mini" onclick="taskAct('/integrate')">Integrate</button>
        <button id="advBuild" class="sec mini" onclick="taskAct('/dispatch')">Build this</button>
      </div>
    </details>
  </div>

  <div class="card">
    <h2>Project</h2>
    <div class="row"><input id="target" placeholder="repo_path | test command"></div>
    <div class="row"><button id="targetBtn" class="sec" onclick="setTarget()">Set build target</button></div>
    <div class="row"><input id="npName" placeholder="new project name"></div>
    <div class="row"><input id="npRepo" placeholder="repo path"></div>
    <div class="row"><input id="npTest" placeholder="test command (default: python -m pytest -q)"></div>
    <div class="row"><input id="npSeed" placeholder="seed idea (optional — starts research)"></div>
    <div class="row"><button id="newProjBtn" class="sec" onclick="newProject()">New project</button></div>
    <div class="row">
      <select id="switch"></select>
      <button id="switchBtn" class="sec" onclick="switchProject()">Switch</button>
    </div>
  </div>

  <div class="card"><h2>Progress</h2><div id="log"></div></div>
</main>
<div id="toast"></div>

<script>
let lastSeq = 0, lastState = null;
// Fetch relative to the page's own directory so the same page works at http://host:8090/ (BASE='/')
// AND behind a reverse proxy at https://host/<prefix>/ (BASE='/<prefix>/', where handle_path strips
// the prefix for the panel).
const BASE = location.pathname.replace(/[^/]*$/, '');
const U = p => BASE + p.replace(/^\//, '');
const $ = id => document.getElementById(id);

function toast(msg, err) {
  const t = $('toast');
  t.textContent = msg; t.className = 'show' + (err ? ' err' : '');
  setTimeout(() => t.className = '', err ? 4000 : 2000);
}
async function api(path, body) {
  const opt = body !== undefined
    ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }
    : {};
  const r = await fetch(U(path), opt);
  let data = {}; try { data = await r.json(); } catch(e){}
  if (!r.ok) { toast(data.error || (r.status+' '+path), true); throw new Error(data.error||r.status); }
  return data;
}
async function act(path, body) { try { await api(path, body||{}); await refresh(); } catch(e){} }

function startResearch(){ const s=$('seed').value.trim();
  if(!s) return toast('enter a seed', true);
  act('/research/start', {seed:s}).then(()=>$('seed').value=''); }
function answer(){ const a=$('answer').value.trim();
  if(!a) return toast('enter an answer', true);
  act('/research/answer', {answer:a}).then(()=>$('answer').value=''); }
function signSpec(sid){ sid = sid || (lastState && lastState.unsigned_spec_id);
  if(!sid) return toast('no unsigned spec', true);
  if(!confirm('Sign spec '+sid+'? This admits the build.')) return;
  act('/spec/sign', {spec_id:sid}); }
function rejectSpec(sid){ sid = sid || (lastState && lastState.unsigned_spec_id);
  if(!sid) return toast('no unsigned spec', true);
  const r=prompt('reject reason:'); if(r) act('/spec/reject',{spec_id:sid, reason:r}); }
function taskAct(path){ const t=$('taskid').value.trim();
  if(!t) return toast('enter a task_id', true); act(path,{task_id:t}); }
function setTarget(){ const v=$('target').value.trim();
  if(!v) return toast('enter repo | cmd', true);
  act('/target/set',{value:v}).then(()=>$('target').value=''); }
function newProject(){ const name=$('npName').value.trim(), repo=$('npRepo').value.trim(),
    test=$('npTest').value.trim(), seed=$('npSeed').value.trim();
  if(!name||!repo) return toast('name and repo path are required', true);
  act('/project/new',{name:name,repo:repo,test_command:test,seed:seed}).then(()=>{
    $('npName').value=''; $('npRepo').value=''; $('npTest').value=''; $('npSeed').value=''; }); }
function switchProject(){ const db=$('switch').value;
  if(db) act('/project/switch',{db_path:db}); }

// --- spec viewer (read before you sign; Sign/Reject act on the VIEWED spec_id) ---
async function viewSpec(){
  const sid = lastState && lastState.unsigned_spec_id;
  if(!sid) return toast('no unsigned spec to review', true);
  let body; try { body = await api('/spec/review/'+encodeURIComponent(sid)); } catch(e){ return; }
  const ov=document.createElement('div'); ov.className='overlay';
  const head=document.createElement('div'); head.style.fontWeight='600';
  head.textContent='spec '+sid;                       // textContent everywhere — spec text is LLM
  const pane=document.createElement('div'); pane.className='body';   // output, never innerHTML
  for(const [k,v] of Object.entries(body)){
    const h=document.createElement('h3'); h.textContent=k;
    const pre=document.createElement('pre');
    pre.textContent = typeof v==='string' ? v : JSON.stringify(v, null, 2);
    pane.appendChild(h); pane.appendChild(pre);
  }
  const row=document.createElement('div'); row.className='row';
  const mk=(label, cls, fn)=>{ const b=document.createElement('button');
    b.textContent=label; if(cls) b.className=cls; b.onclick=fn; row.appendChild(b); return b; };
  mk('Sign', '', ()=>{ ov.remove(); signSpec(sid); });
  mk('Reject…', 'sec', ()=>{ ov.remove(); rejectSpec(sid); });
  mk('Close', 'sec', ()=>ov.remove());
  ov.appendChild(head); ov.appendChild(pane); ov.appendChild(row);
  document.body.appendChild(ov);
}

async function copyDiag(){
  let text;
  try { const r = await fetch(U('/diag')); if(!r.ok) throw 0; text = await r.text(); }
  catch(e){ toast('could not fetch diagnostics', true); return; }
  try { await navigator.clipboard.writeText(text); toast('copied — paste to Claude'); }
  catch(e){ fallbackCopy(text); }
}
function fallbackCopy(text){
  const ov=document.createElement('div'); ov.className='overlay';
  const hint=document.createElement('div'); hint.style.color='#8b949e';
  hint.textContent='Long-press the text → Select All → Copy, then tap Done';
  const ta=document.createElement('textarea'); ta.value=text; ta.readOnly=true;
  const btn=document.createElement('button'); btn.textContent='Done'; btn.onclick=()=>ov.remove();
  ov.appendChild(hint); ov.appendChild(ta); ov.appendChild(btn); document.body.appendChild(ov);
  ta.focus(); ta.select(); try { document.execCommand('copy'); toast('copied'); } catch(_){}
}
async function loadProjects(){
  try { const d=await api('/projects'); const sel=$('switch');
    sel.replaceChildren();                                  // DOM-built (store text, not markup)
    const opt0=document.createElement('option'); opt0.value=''; opt0.textContent='switch project…';
    sel.appendChild(opt0);
    for(const p of d.projects){ const o=document.createElement('option');
      o.value=p.db_path; o.textContent=p.name+' → '+p.target; sel.appendChild(o); }
  } catch(e){}
}

// --- task rows: contextual actions, no hand-typed task_ids ---
// Descriptions/reasons are LLM-derived (director plans, verifier output) — build with
// createElement/textContent ONLY (the rev-0.3.44 untrusted-text class; innerHTML is banned here).
function renderTasks(s){
  const host=$('tasks'); host.replaceChildren();
  for(const t of (s.tasks||[])){
    const card=document.createElement('div'); card.className='task';
    const row=document.createElement('div'); row.className='trow';
    const tid=document.createElement('span'); tid.className='tid'; tid.textContent=t.task_id;
    const badge=document.createElement('span');
    if(t.outcome==null){ badge.className='badge'+(t.certifiable?' crt':'');
      badge.textContent=t.certifiable?'verifier ✓ — certify':'pending'; }
    else if(t.outcome==='completed'){ badge.className='badge ok'; badge.textContent='✓ completed'; }
    else { badge.className='badge blk'; badge.textContent='⚠ '+t.outcome; }
    row.appendChild(tid); row.appendChild(badge);
    const btn=(label, path, primary)=>{ const b=document.createElement('button');
      b.className=(primary?'':'sec ')+'mini'; b.textContent=label; b.disabled=!!s.busy;
      b.onclick=()=>act(path,{task_id:t.task_id}); row.appendChild(b); return b; };
    // a certifiable row hides Build — re-dispatching would discard the verifier pass it advertises
    if(t.outcome==null && t.buildable && !t.certifiable) btn('Build','/dispatch', true);
    if(t.certifiable) btn('Certify','/certify', true);
    if(t.outcome!=null && t.outcome!=='completed'){
      const b=btn('Retry','/dispatch', true);
      if(s.next_action==='retry') b.classList.add('next');
    }
    if(t.outcome!=null) btn('Integrate','/integrate', false);
    card.appendChild(row);
    if(t.description){ const d=document.createElement('div'); d.className='desc';
      d.textContent=t.description; card.appendChild(d); }
    if(t.reason){ const r=document.createElement('div'); r.className='reason';
      r.textContent=t.reason; card.appendChild(r); }
    host.appendChild(card);
  }
}

// --- state-aware buttons: busy gates everything but Cancel/Answer; next_action glows ---
const NEXT_BTN = { answer:'answerBtn', sign:'viewSpecBtn', research:'researchBtn', plan:'planBtn',
                   build:'buildBtn', assemble:'assembleBtn', target:'targetBtn' };
function gateButtons(s){
  const busy=!!s.busy, spec=!!s.unsigned_spec_id;
  // Answer stays live while research is parked on a question — disabling it wedges the interview.
  $('answerBtn').disabled=false;
  for(const id of ['researchBtn','viewSpecBtn','signBtn','rejectBtn','planBtn','buildBtn',
                   'assembleBtn','targetBtn','newProjBtn','switchBtn',
                   'advCertify','advIntegrate','advBuild'])
    $(id).disabled=busy;
  if(!busy){
    $('viewSpecBtn').disabled=!spec; $('signBtn').disabled=!spec; $('rejectBtn').disabled=!spec;
    $('buildBtn').disabled=(s.next_action==='target');   // no build target set (session or env)
  }
  $('cancelBtn').disabled=!busy;
  for(const id of Object.values(NEXT_BTN)) $(id).classList.remove('next');
  const glow=NEXT_BTN[s.next_action];
  if(glow && !$(glow).disabled) $(glow).classList.add('next');
}

async function refresh(){
  let s; try { s=await api('/state'); } catch(e){ return; }
  lastState = s;
  const h=$('hint'); h.textContent='→ '+s.next_hint;
  h.className='hint'+(s.next_hint.startsWith('⚠')?' warn':'');
  let proj=(s.db_path||'').split(/[\\/]/).pop();
  // Label old data on sight: days since the store's last EVENT (a running build writes events, so
  // the label clears itself the moment real work resumes).
  if(s.store_activity_millis){
    const days=(Date.now()-s.store_activity_millis)/86400000;
    if(days>=1) proj+=' · last activity '+Math.floor(days)+'d ago';
  }
  $('proj').textContent=proj;
  $('busy').textContent=s.busy?('● '+s.busy):'';
  $('cost').textContent='$'+(s.cost_total_usd||0).toFixed(2);
  $('events').textContent=s.event_count+' events';
  $('inv').textContent = s.invariant_violations>0
    ? ('  ⚠ '+s.invariant_violations+' invariant violation'+(s.invariant_violations==1?'':'s')) : '';
  const chips=$('chips'); chips.replaceChildren();
  for(const [k,v] of Object.entries(s.tasks_by_state||{})){
    const c=document.createElement('span'); c.textContent=k+': '+v; chips.appendChild(c); }
  renderTasks(s);
  gateButtons(s);
  const q=$('question');
  // `display` = the COMPLETE question, readable (rev 0.4.12) — `text` is the raw stored value
  // (machine JSON for a divergence round; the rev-0.4.10 full-text swap put that wall on the
  // card), `readable` the one-line summary. Chain covers old-server/new-page skew both ways.
  if(s.pending_question){ q.style.display='block';
    $('qtext').textContent=s.pending_question.display||s.pending_question.text||s.pending_question.readable; }
  else q.style.display='none';
  const nb=$('noticebanner');
  if(s.notice){ nb.style.display='block'; nb.textContent=s.notice; }
  else nb.style.display='none';
  const eb=$('errbanner'), lj=s.last_job;
  if(lj && lj.status==='error'){ eb.style.display='block';
    eb.textContent='⚠ '+lj.label+' failed — tap to copy diagnostics for Claude'; }
  else eb.style.display='none';
}
async function pollLog(){
  try { const d=await api('/events?after='+lastSeq);
    if(d.events.length){ const log=$('log');
      for(const e of d.events){
        if(e.seq<=lastSeq) continue;   // dedup guard: never re-render an already-shown event
        lastSeq=e.seq;
        log.textContent += `#${e.seq} ${e.line || e.event_type}\n`; }
      log.scrollTop=log.scrollHeight; }
  } catch(e){}
}
// Self-schedule (poll, THEN wait) instead of setInterval, so a slow poll during a build burst can't
// overlap the next one and re-append events (the duplicate-log wall). One tick at a time.
async function tick(){ await refresh(); await pollLog(); }
(async function loop(){ for(;;){ await tick(); await new Promise(r=>setTimeout(r,1500)); } })();
loadProjects(); setInterval(loadProjects, 15000);
</script>
</body>
</html>
